version: "3.5"
services:
  beacon-chain:
    build:
      context: beacon-chain
      args:
        UPSTREAM_VERSION: 26.4.0
        STAKER_SCRIPTS_VERSION: v0.1.2
        DATA_DIR: /opt/teku/data
    environment:
      FEE_RECIPIENT_ADDRESS: "0x0000000000000000000000000000000000000000"
      EXTRA_OPTS: ""
      JAVA_OPTS: "-Xmx6g"
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
  validator:
    build:
      context: validator
      args:
        UPSTREAM_VERSION: 26.4.0
        STAKER_SCRIPTS_VERSION: v0.1.2
        DATA_DIR: /opt/teku/data
    environment:
      LOG_LEVEL: INFO
      GRAFFITI: validating_from_DAppNode
      EXTRA_OPTS: ""
      FEE_RECIPIENT_ADDRESS: "0x0000000000000000000000000000000000000000"
      BACKUP_BEACON_NODES: ""
      JAVA_OPTS: "-Xmx6g"
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
