version: "3.5"
services:
  beacon-chain:
    build:
      args:
        NETWORK: lukso
        P2P_PORT: 9905
    environment:
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync-lukso.dappnode.net"
    ports:
      - "9905:9905"
      - "9905:9905/udp"
    volumes:
      - teku-lukso-data:/opt/teku/data
  validator:
    build:
      args:
        NETWORK: lukso
volumes:
  teku-lukso-data: {}
